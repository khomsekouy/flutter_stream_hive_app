name: flutter_stream_hive_app
description: My new Streaming app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  fpdart: ^1.2.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  intl: ^0.20.2
  top_snackbar_flutter: ^3.3.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    # Subfolders are not included recursively — each must be declared.
    - assets/images/banners/
    - assets/images/leagues/

# Type-safe asset references generated by flutter_gen.
# Regenerate after adding/removing assets:
#   dart run build_runner build --delete-conflicting-outputs
flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false
